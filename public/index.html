<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoWarm — Discovery Call Prep</title>
<style>
  :root {
    --ember: #E8630A;
    --ember-hover: #CC5507;
    --navy: #1A3A5C;
    --navy-light: #2A4D73;
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --border: #E4E7EB;
    --text: #1F2937;
    --text-muted: #6B7280;
    --success: #059669;
    --warning: #D97706;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--navy);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header .badge {
    background: var(--ember);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 32px 64px;
  }

  /* Session usage banner */
  .session-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ember);
    border-radius: 6px;
    padding: 12px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 13px;
  }
  .session-banner .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .session-banner .stat-label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .session-banner .stat-value {
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .session-banner .stat-value.cost {
    color: var(--ember);
  }

  .control-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .control-bar label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .control-bar select,
  .control-bar input[type="text"] {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
    font-size: 14px;
    min-width: 220px;
  }
  .control-bar input[type="text"]:focus,
  .control-bar select:focus {
    outline: none;
    border-color: var(--ember);
    box-shadow: 0 0 0 3px rgba(232, 99, 10, 0.1);
  }
  .methodology-help {
    width: 100%;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 8px 12px;
    background: #F9FAFB;
    border-radius: 4px;
    border-left: 2px solid var(--border);
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: var(--ember);
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--ember-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .deal-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--navy);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .deal-summary strong { color: var(--text); }

  /* Per-run usage card */
  .run-usage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--success);
    border-radius: 6px;
    padding: 12px 20px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .run-usage .label { font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.4px; font-size: 11px; }
  .run-usage .chip { font-variant-numeric: tabular-nums; color: var(--text); }

  .methodology-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .methodology-pill.default   { background: #E5E7EB; color: #374151; }
  .methodology-pill.meddic    { background: #DBEAFE; color: #1E40AF; }
  .methodology-pill.challenger { background: #FEF3C7; color: #92400E; }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--navy);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card .copy-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  .card .copy-btn:hover { background: var(--bg); color: var(--text); }
  .card .content {
    font-size: 14px;
    color: var(--text);
    white-space: pre-wrap;
  }
  .card .content .subject-line {
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--border);
  }
  .card .content ol, .card .content ul { padding-left: 20px; margin: 8px 0; }
  .card .content li { margin-bottom: 6px; }

  .email-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .email-tabs button {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  .email-tabs button.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }

  .next-step {
    display: inline-block;
    background: #FFF4EC;
    color: var(--ember);
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .confidence-banner {
    background: #FEF3C7;
    border-left: 3px solid var(--warning);
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    color: #78350F;
    margin-top: 24px;
  }

  .loading {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .loading .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--ember);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: #FEE2E2;
    border-left: 3px solid #DC2626;
    padding: 16px;
    border-radius: 4px;
    color: #7F1D1D;
    font-size: 14px;
  }

  @media (max-width: 800px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>GoWarm Sales Execution</h1>
  <span class="badge">Skill: Discovery Call Prep</span>
</header>

<main>

  <div id="sessionBanner" class="session-banner" style="display:none;">
    <div class="stat">
      <span class="stat-label">Session runs</span>
      <span class="stat-value" id="sess-calls">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Input tokens</span>
      <span class="stat-value" id="sess-input">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Output tokens</span>
      <span class="stat-value" id="sess-output">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total tokens</span>
      <span class="stat-value" id="sess-total">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Estimated cost</span>
      <span class="stat-value cost" id="sess-cost">$0.0000</span>
    </div>
  </div>

  <div class="control-bar">
    <label for="dealInput">Deal ID:</label>
    <input id="dealInput" type="text" placeholder="e.g. 113" value="113" />

    <label for="methodologySelect">Methodology:</label>
    <select id="methodologySelect">
      <option value="">Default (no methodology)</option>
      <option value="meddic">MEDDIC — qualification-heavy</option>
      <option value="challenger">Challenger — teach & reframe</option>
    </select>

    <button id="runBtn">Run Discovery Call Prep</button>

    <div class="methodology-help" id="methodologyHelp">
      No methodology selected — runs with the base skill defaults.
    </div>
  </div>

  <div id="dealSummary" class="deal-summary" style="display:none;"></div>
  <div id="runUsage" class="run-usage" style="display:none;"></div>
  <div id="output"></div>

</main>

<script>
const $ = (id) => document.getElementById(id);
let activeEmailVariant = "strong";
let lastOutput = null;

const METHODOLOGY_DESCRIPTIONS = {
  "":           "No methodology selected — runs with the base skill defaults.",
  "meddic":     "MEDDIC: treats the call as a qualification exercise. Questions target specific MEDDIC field gaps. Recommended next steps skew toward multi_thread or disqualify.",
  "challenger": "Challenger: rep leads with a reframe and teaches the prospect something non-obvious. Questions create constructive tension. Close takes control.",
};

$("runBtn").addEventListener("click", runSkill);
$("methodologySelect").addEventListener("change", (e) => {
  $("methodologyHelp").textContent = METHODOLOGY_DESCRIPTIONS[e.target.value] || METHODOLOGY_DESCRIPTIONS[""];
});

// Load session totals on page load
loadSessionTotals();

async function loadSessionTotals() {
  try {
    const r = await fetch("/api/usage");
    if (!r.ok) return;
    const data = await r.json();
    if (data.session_totals && data.session_totals.call_count > 0) {
      renderSessionTotals(data.session_totals);
    }
  } catch (e) { /* ignore */ }
}

function renderSessionTotals(totals) {
  $("sessionBanner").style.display = "flex";
  $("sess-calls").textContent  = totals.call_count;
  $("sess-input").textContent  = fmtNum(totals.input_tokens);
  $("sess-output").textContent = fmtNum(totals.output_tokens);
  $("sess-total").textContent  = fmtNum(totals.total_tokens);
  $("sess-cost").textContent   = "$" + totals.estimated_cost_usd.toFixed(4);
}

function fmtNum(n) {
  if (n == null) return "0";
  return n.toLocaleString();
}

async function runSkill() {
  const dealId = $("dealInput").value.trim();
  const methodology = $("methodologySelect").value;

  if (!dealId) {
    $("output").innerHTML = `<div class="error">Enter a deal ID to run the skill.</div>`;
    return;
  }

  const btn = $("runBtn");
  const output = $("output");
  btn.disabled = true;
  btn.textContent = "Running...";
  output.innerHTML = `<div class="loading"><span class="spinner"></span>Running skill against deal payload...</div>`;
  $("dealSummary").style.display = "none";
  $("runUsage").style.display = "none";

  try {
    // Fetch deal payload
    const dealResp = await fetch(`/api/deals/${dealId}/context`);
    if (!dealResp.ok) {
      const errBody = await dealResp.json().catch(() => ({}));
      throw new Error(`Deal fetch failed: ${dealResp.status} ${errBody.error || ""}`);
    }
    const dealPayload = await dealResp.json();
    renderDealSummary(dealPayload);

    // Run skill
    const skillResp = await fetch("/api/skills/discovery-call-prep", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dealPayload, methodology: methodology || undefined }),
    });
    const skillData = await skillResp.json();

    if (skillResp.ok && skillData.ok) {
      lastOutput = skillData.output;
      renderRunUsage(skillData.usage, skillData.methodology);
      renderOutput(skillData.output);
      if (skillData.session_totals) renderSessionTotals(skillData.session_totals);
    } else {
      // If skill output failed to parse, we may still have a usage entry
      if (skillData.usage) renderRunUsage(skillData.usage, methodology);
      output.innerHTML = `<div class="error"><strong>Error:</strong> ${skillData.error || "unknown"}${skillData.raw ? `<br><br><em>Raw output (first 2k chars):</em><pre style="white-space:pre-wrap;font-size:12px;">${escapeHtml(skillData.raw)}</pre>` : ""}</div>`;
    }
  } catch (err) {
    output.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Run Discovery Call Prep";
  }
}

function renderDealSummary(d) {
  const summary = $("dealSummary");
  const interactionCount = (d.interaction_history || []).length;
  const prospectName = d.prospect?.name || "Unknown";
  summary.innerHTML = `
    <strong>${escapeHtml(prospectName)}</strong> · ${escapeHtml(d.prospect?.title || "—")} at ${escapeHtml(d.prospect?.company || d.account?.name || "—")}
    &nbsp;·&nbsp; ${escapeHtml(d.account?.industry || "—")} (${escapeHtml(d.account?.size || "?")})
    &nbsp;·&nbsp; Stage: <strong>${escapeHtml(d.deal?.stage || "?")}</strong>
    &nbsp;·&nbsp; Source: ${escapeHtml(d.deal?.source || "—")}
    &nbsp;·&nbsp; ${interactionCount} prior interactions
  `;
  summary.style.display = "block";
}

function renderRunUsage(usage, methodology) {
  if (!usage) return;
  const box = $("runUsage");
  const methClass = (methodology || "default").toLowerCase();
  const methLabel = (methodology || "default").toUpperCase();
  box.innerHTML = `
    <span class="label">This run</span>
    <span class="chip"><span class="methodology-pill ${methClass}">${methLabel}</span></span>
    <span class="chip">Model: <strong>${escapeHtml(usage.model || "?")}</strong></span>
    <span class="chip">Input: <strong>${fmtNum(usage.input_tokens)}</strong></span>
    <span class="chip">Output: <strong>${fmtNum(usage.output_tokens)}</strong></span>
    <span class="chip">Total: <strong>${fmtNum(usage.total_tokens)}</strong></span>
    <span class="chip">Cost: <strong style="color:var(--ember)">$${(usage.estimated_cost_usd || 0).toFixed(5)}</strong></span>
    <span class="chip">Latency: <strong>${usage.latency_ms ? (usage.latency_ms / 1000).toFixed(1) + "s" : "?"}</strong></span>
  `;
  box.style.display = "flex";
}

function renderOutput(out) {
  if (out.error) {
    $("output").innerHTML = `<div class="error"><strong>Skill returned error:</strong> ${escapeHtml(out.error)}. Missing: ${escapeHtml((out.missing || []).join(", "))}</div>`;
    return;
  }

  const tt = out.talk_track || {};
  const questions = (tt.discovery_questions || []).map(q => `<li>${escapeHtml(q)}</li>`).join("");
  const nextStep = out.recommended_next_step || {};

  const html = `
    <div class="cards">

      <div class="card">
        <h2>
          Prep Brief
          <button class="copy-btn" onclick="copyToClipboard('prep-brief')">Copy</button>
        </h2>
        <div class="content" id="prep-brief">${escapeHtml(out.prep_brief || "")}</div>
      </div>

      <div class="card">
        <h2>
          Talk Track
          <button class="copy-btn" onclick="copyToClipboard('talk-track')">Copy</button>
        </h2>
        <div class="content" id="talk-track">
          <strong>Opening (30s)</strong><br>${escapeHtml(tt.opening || "")}<br><br>
          <strong>Context confirmation (2m)</strong><br>${escapeHtml(tt.context_confirmation || "")}<br><br>
          <strong>Discovery questions</strong><ol>${questions}</ol>
          <strong>Close (1m)</strong><br>${escapeHtml(tt.close || "")}
        </div>
      </div>

      <div class="card">
        <h2>
          Follow-up Email
          <button class="copy-btn" onclick="copyEmail()">Copy</button>
        </h2>
        <div class="email-tabs">
          <button class="${activeEmailVariant === 'strong' ? 'active' : ''}" onclick="switchEmail('strong')">Strong signal</button>
          <button class="${activeEmailVariant === 'weak' ? 'active' : ''}" onclick="switchEmail('weak')">Weak signal</button>
        </div>
        <div class="content" id="email-content">
          ${renderEmail(activeEmailVariant === 'strong' ? out.follow_up_email_strong : out.follow_up_email_weak)}
        </div>
      </div>

      <div class="card">
        <h2>Recommended Next Step</h2>
        <div class="content">
          <span class="next-step">${escapeHtml((nextStep.play || "").replace(/_/g, ' '))}</span>
          <div style="margin-top: 8px;">${escapeHtml(nextStep.rationale || "")}</div>
        </div>
      </div>

    </div>

    ${out.confidence_notes ? `<div class="confidence-banner"><strong>Confidence notes:</strong> ${escapeHtml(out.confidence_notes)}</div>` : ""}
  `;
  $("output").innerHTML = html;
}

function renderEmail(email) {
  if (!email) return "";
  return `
    <div class="subject-line">Subject: ${escapeHtml(email.subject || "")}</div>
    ${escapeHtml(email.body || "")}
  `;
}

function switchEmail(variant) {
  activeEmailVariant = variant;
  if (lastOutput) renderOutput(lastOutput);
}

function copyToClipboard(elementId) {
  const el = document.getElementById(elementId);
  navigator.clipboard.writeText(el.innerText);
}

function copyEmail() {
  const email = activeEmailVariant === 'strong' ? lastOutput.follow_up_email_strong : lastOutput.follow_up_email_weak;
  if (!email) return;
  navigator.clipboard.writeText(`Subject: ${email.subject}\n\n${email.body}`);
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
